name: Frontend Build and Test

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24'
      working-directory:
        description: 'Working directory for frontend'
        required: false
        type: string
        default: './frontend'
    secrets:
      FRONTEND_ENV:
        required: false
    outputs:
      build-status:
        description: "Build status"
        value: ${{ jobs.frontend.outputs.status }}

jobs:
  frontend:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.build.outcome }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          check-latest: true
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm i
      
      # - name: Run tests
      #   run: npm test
       
      - name: Build frontend
        id: build
        run: npm run build