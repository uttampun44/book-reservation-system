    #     run: |
    #       echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" > .env
    #       echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> .env
    #       echo "MONGODB_URI=${{ secrets.MONGO_URI }}" >> .env
    #       echo "PORT=8080" >> .env
    #       npm i

      - name: Start Backend Server
        working-directory: ${{ inputs.backend-directory }}
        run: |
