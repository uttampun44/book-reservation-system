name: Integration Tests

on:
  workflow_call:
    inputs:
      backend-directory:
        required: false
        type: string
        default: './e-commerce-backend'
      frontend-directory:
        required: false
        type: string
        default: './e-commerce-frontend'
    # secrets:
    #   JWT_SECRET_KEY:
    #     required: true
    #   FRONTEND_ENV:
